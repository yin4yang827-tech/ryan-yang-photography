<!DOCTYPE html>
<!--
  Ryan Yang Photography — Home / Portfolio
  ————————————————————————————————————————
  To add a photo: drop the file in images/ and copy one of the
  <figure class="card"> blocks below. data-category controls which
  filter chip it belongs to (niagara / city / nature / wander).
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryan Yang Photography — Landscape & Travel</title>
  <meta name="description" content="Landscape and travel photography by Ryan Yang: Niagara Falls, New York City, forest trails, and the moments in between.">

  <!-- Fonts: Quicksand (headings) + Nunito Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ======================= NAVIGATION ======================= -->
  <nav class="nav">
    <a class="nav__brand" href="index.html">
      <span class="nav__dot" aria-hidden="true"></span>
      <strong>Ryan Yang</strong> <span>Photography</span>
    </a>
    <div class="nav__links">
      <a class="nav__link nav__link--active" href="index.html">Portfolio</a>
      <a class="nav__link" href="about.html">About</a>
    </div>
  </nav>

  <!-- ======================= HERO ======================= -->
  <header class="hero">
    <span class="badge">Landscape &amp; Travel</span>
    <h1>Collecting light from<br>beautiful places</h1>
    <p>From the mist of Niagara to quiet forest trails and city evenings — little moments worth keeping.</p>
  </header>

  <!-- ======================= FILTERS ======================= -->
  <div class="filters" role="group" aria-label="Filter photos by category">
    <button class="chip chip--active" data-filter="all">All photos</button>
    <button class="chip" data-filter="niagara">Niagara Falls</button>
    <button class="chip" data-filter="city">New York City</button>
    <button class="chip" data-filter="nature">Nature</button>
    <button class="chip" data-filter="wander">Wanderings</button>
  </div>

  <!-- ======================= GALLERY ======================= -->
  <main class="gallery-wrap">
    <div class="gallery">
      <!-- Lookout -->
      <figure class="card" data-category="niagara" data-title="Lookout" data-location="Niagara Falls, ON">
        <img src="images/DSC_0745.jpg" alt="Ring-billed gull perched above the Niagara gorge" loading="lazy">
        <figcaption>
          <span class="title">Lookout</span>
          <span class="location">Niagara Falls, ON</span>
        </figcaption>
      </figure>

      <!-- Balloon over the Falls -->
      <figure class="card" data-category="niagara" data-title="Balloon over the Falls" data-location="Niagara Falls">
        <img src="images/DSC_0829.jpg" alt="Helium observation balloon floating over American Falls" loading="lazy">
        <figcaption>
          <span class="title">Balloon over the Falls</span>
          <span class="location">Niagara Falls</span>
        </figcaption>
      </figure>

      <!-- Flight Lines -->
      <figure class="card" data-category="niagara" data-title="Flight Lines" data-location="Niagara Falls">
        <img src="images/DSC_0787.jpg" alt="Zipliners silhouetted against Horseshoe Falls, black and white" loading="lazy">
        <figcaption>
          <span class="title">Flight Lines</span>
          <span class="location">Niagara Falls</span>
        </figcaption>
      </figure>

      <!-- Canopy Light -->
      <figure class="card" data-category="nature" data-title="Canopy Light" data-location="Upstate New York">
        <img src="images/DSC_0194.jpg" alt="Sunburst through a dark maple canopy" loading="lazy">
        <figcaption>
          <span class="title">Canopy Light</span>
          <span class="location">Upstate New York</span>
        </figcaption>
      </figure>

      <!-- One World Trade -->
      <figure class="card" data-category="city" data-title="One World Trade" data-location="New York City">
        <img src="images/DSC_0419.jpg" alt="One World Trade Center rising between buildings at dusk" loading="lazy">
        <figcaption>
          <span class="title">One World Trade</span>
          <span class="location">New York City</span>
        </figcaption>
      </figure>

      <!-- Maid of the Mist -->
      <figure class="card" data-category="niagara" data-title="Maid of the Mist" data-location="Niagara Falls">
        <img src="images/DSC_0801.jpg" alt="Tour boat below the falls framed by a wrought-iron railing" loading="lazy">
        <figcaption>
          <span class="title">Maid of the Mist</span>
          <span class="location">Niagara Falls</span>
        </figcaption>
      </figure>

      <!-- Golden Reflections -->
      <figure class="card" data-category="nature" data-title="Golden Reflections" data-location="Autumn pond">
        <img src="images/DSC_0092.jpg" alt="Canada goose swimming through golden autumn reflections" loading="lazy">
        <figcaption>
          <span class="title">Golden Reflections</span>
          <span class="location">Autumn pond</span>
        </figcaption>
      </figure>

      <!-- Brooklyn Bridge Sunset -->
      <figure class="card" data-category="city" data-title="Brooklyn Bridge Sunset" data-location="New York City">
        <img src="images/DSC_0493.jpg" alt="Manhattan skyline at sunset through Brooklyn Bridge cables" loading="lazy">
        <figcaption>
          <span class="title">Brooklyn Bridge Sunset</span>
          <span class="location">New York City</span>
        </figcaption>
      </figure>

      <!-- Misty Morning -->
      <figure class="card" data-category="niagara" data-title="Misty Morning" data-location="Horseshoe Falls">
        <img src="images/DSC_0778.jpg" alt="Portrait at the railing with Horseshoe Falls behind" loading="lazy">
        <figcaption>
          <span class="title">Misty Morning</span>
          <span class="location">Horseshoe Falls</span>
        </figcaption>
      </figure>

      <!-- After the Rain -->
      <figure class="card" data-category="nature" data-title="After the Rain" data-location="Forest trail">
        <img src="images/DSC_0200.jpg" alt="Rain-dappled beech leaves in a green forest" loading="lazy">
        <figcaption>
          <span class="title">After the Rain</span>
          <span class="location">Forest trail</span>
        </figcaption>
      </figure>

      <!-- Skyline Silhouettes -->
      <figure class="card" data-category="city" data-title="Skyline Silhouettes" data-location="Lower Manhattan">
        <img src="images/DSC_0444.jpg" alt="Downtown towers silhouetted against a teal evening sky" loading="lazy">
        <figcaption>
          <span class="title">Skyline Silhouettes</span>
          <span class="location">Lower Manhattan</span>
        </figcaption>
      </figure>

      <!-- Into the Sun -->
      <figure class="card" data-category="niagara" data-title="Into the Sun" data-location="Niagara gorge">
        <img src="images/DSC_0791.jpg" alt="Gulls scattered across a deep blue sky with sun flare" loading="lazy">
        <figcaption>
          <span class="title">Into the Sun</span>
          <span class="location">Niagara gorge</span>
        </figcaption>
      </figure>

      <!-- Summer Shore -->
      <figure class="card" data-category="wander" data-title="Summer Shore" data-location="Outer Banks, NC">
        <img src="images/DSC_0937.jpg" alt="Busy summer beach with umbrellas and rolling surf" loading="lazy">
        <figcaption>
          <span class="title">Summer Shore</span>
          <span class="location">Outer Banks, NC</span>
        </figcaption>
      </figure>

      <!-- Creek Bed -->
      <figure class="card" data-category="nature" data-title="Creek Bed" data-location="Watkins Glen">
        <img src="images/DSC_0120.jpg" alt="Sunlight falling on mossy stones in a dry creek bed" loading="lazy">
        <figcaption>
          <span class="title">Creek Bed</span>
          <span class="location">Watkins Glen</span>
        </figcaption>
      </figure>

      <!-- Blue Skies at the Falls -->
      <figure class="card" data-category="niagara" data-title="Blue Skies at the Falls" data-location="Horseshoe Falls">
        <img src="images/DSC_0780.jpg" alt="Portrait with Horseshoe Falls and turquoise water behind" loading="lazy">
        <figcaption>
          <span class="title">Blue Skies at the Falls</span>
          <span class="location">Horseshoe Falls</span>
        </figcaption>
      </figure>

      <!-- Foley Square -->
      <figure class="card" data-category="city" data-title="Foley Square" data-location="New York City">
        <img src="images/DSC_0428.jpg" alt="Street scene in selective color with red traffic lights" loading="lazy">
        <figcaption>
          <span class="title">Foley Square</span>
          <span class="location">New York City</span>
        </figcaption>
      </figure>

      <!-- Crape Myrtle -->
      <figure class="card" data-category="nature" data-title="Crape Myrtle" data-location="Summer garden">
        <img src="images/DSC_0241.jpg" alt="Japanese beetles resting in pink crape myrtle blossoms" loading="lazy">
        <figcaption>
          <span class="title">Crape Myrtle</span>
          <span class="location">Summer garden</span>
        </figcaption>
      </figure>

      <!-- City in Motion -->
      <figure class="card" data-category="city" data-title="City in Motion" data-location="East River">
        <img src="images/DSC_0554.jpg" alt="Abstract light trails of the Manhattan Bridge at night" loading="lazy">
        <figcaption>
          <span class="title">City in Motion</span>
          <span class="location">East River</span>
        </figcaption>
      </figure>

      <!-- Over the Ridge -->
      <figure class="card" data-category="niagara" data-title="Over the Ridge" data-location="Niagara gorge">
        <img src="images/DSC_0730.jpg" alt="Two gulls gliding over a treed cliff edge" loading="lazy">
        <figcaption>
          <span class="title">Over the Ridge</span>
          <span class="location">Niagara gorge</span>
        </figcaption>
      </figure>

      <!-- Rose on the Trail -->
      <figure class="card" data-category="nature" data-title="Rose on the Trail" data-location="Found object">
        <img src="images/DSC_0356.jpg" alt="Single red rose lying on dark forest ground" loading="lazy">
        <figcaption>
          <span class="title">Rose on the Trail</span>
          <span class="location">Found object</span>
        </figcaption>
      </figure>

      <!-- Passing Overhead -->
      <figure class="card" data-category="city" data-title="Passing Overhead" data-location="Queens, NY">
        <img src="images/DSC_0440.jpg" alt="Jet crossing a deep blue sky above a streetlamp" loading="lazy">
        <figcaption>
          <span class="title">Passing Overhead</span>
          <span class="location">Queens, NY</span>
        </figcaption>
      </figure>

      <!-- Sixteen Ninety-Three -->
      <figure class="card" data-category="wander" data-title="Sixteen Ninety-Three" data-location="Williamsburg, VA">
        <img src="images/DSC_0866.jpg" alt="Weathervane and cupola lit gold against storm clouds" loading="lazy">
        <figcaption>
          <span class="title">Sixteen Ninety-Three</span>
          <span class="location">Williamsburg, VA</span>
        </figcaption>
      </figure>

      <!-- Small Wanderer -->
      <figure class="card" data-category="nature" data-title="Small Wanderer" data-location="Tree bark, macro">
        <img src="images/DSC_0215.jpg" alt="Spotted lanternfly nymph climbing textured bark" loading="lazy">
        <figcaption>
          <span class="title">Small Wanderer</span>
          <span class="location">Tree bark, macro</span>
        </figcaption>
      </figure>

      <!-- Walking the Sky -->
      <figure class="card" data-category="wander" data-title="Walking the Sky" data-location="Sculpture, dusk">
        <img src="images/DSC_0839.jpg" alt="Figures walking a curved beam into violet fog" loading="lazy">
        <figcaption>
          <span class="title">Walking the Sky</span>
          <span class="location">Sculpture, dusk</span>
        </figcaption>
      </figure>
    </div>
  </main>

  <!-- ======================= LIGHTBOX ======================= -->
  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog">
    <img src="" alt="">
    <div class="lightbox__bar">
      <button class="lightbox__nav lightbox__nav--prev" aria-label="Previous photo">&#8592;</button>
      <div>
        <div class="lightbox__title"></div>
        <div class="lightbox__location"></div>
      </div>
      <button class="lightbox__nav lightbox__nav--next" aria-label="Next photo">&#8594;</button>
    </div>
    <button class="lightbox__close" aria-label="Close">&#10005;</button>
  </div>

  <!-- ======================= FOOTER ======================= -->
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__brand">&copy; 2026 Ryan Yang Photography</div>
      <div class="footer__links">
        <!-- TODO: swap in your real handles -->
        <a href="https://instagram.com/your-handle" target="_blank" rel="noopener">Instagram</a>
        <a href="mailto:hello@example.com">Email</a>
      </div>
    </div>
  </footer>

  <script src="js/gallery.js"></script>
</body>
</html>
